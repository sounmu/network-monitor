services:
  # ─── Rust backend server + embedded web static bundle ────────────
  # Single container serves both /api/* and the Next.js static export
  # on port 3000. All persistent state lives in the `./data` bind
  # mount as a single SQLite file (`netsentinel.db`), so operators can
  # back up with `cp` and there is nothing else to keep in sync.
  server:
    image: ghcr.io/sounmu/netsentinel-server:latest
    build:
      context: .
      dockerfile: netsentinel-server/Dockerfile
      args:
        # NEXT_PUBLIC_API_URL is baked into the static bundle at build
        # time. Empty = same-origin (default — fine for localhost and
        # single-hostname reverse proxies). Override in .env when the
        # API and dashboard live on different hostnames.
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    networks:
      - shared-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Root `.env` is the single source of truth. Every value
    # (JWT_SECRET, ALLOWED_ORIGINS, METRICS_TOKEN, …) is injected here.
    # `netsentinel-server/.env` is reserved for local `cargo run`
    # development only — it is NOT mounted or read by Docker Compose.
    env_file:
      - .env
    environment:
      # Single embedded SQLite file under /app/data. WAL sidecar files
      # (`.wal`, `.shm`) live next to it on the same volume.
      - DATABASE_URL=sqlite:///app/data/netsentinel.db
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -sf http://localhost:3000/api/health > /dev/null || exit 1"
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s
    ports:
      - "${SERVER_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

networks:
  shared-network:
    external: true