services:
  # 1. PostgreSQL + TimescaleDB — no host port exposed; reachable only on the internal network
  db:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-network_monitor}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "random_page_cost=1.1"
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-network_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 4G

  # 2. Rust backend server
  server:
    image: ghcr.io/sounmu/netsentinel-server:latest
    build:
      context: ./netsentinel-server
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./netsentinel-server/.env:/app/.env
    env_file:
      - ./netsentinel-server/.env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-network_monitor}
    ports:
      - "3000:3000"
    networks:
      - shared-network
      - backend-internal
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # 3. Next.js frontend (standalone build)
  web:
    image: ghcr.io/sounmu/netsentinel-web:latest
    build:
      context: ./netsentinel-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      - server
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    networks:
      - shared-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G


networks:
  # shared-network is expected to be created externally (e.g. by a Cloudflare Tunnel container).
  # Create it with: docker network create shared-network
  shared-network:
    external: true
  backend-internal:
