services:
  # NetSentinel hub: Rust API + embedded Next.js static dashboard.
  # The default homelab path pulls a published image instead of building
  # locally. To rebuild from a checkout (or pin to your own image, attach
  # an external network, add a Cloudflare Tunnel sidecar, etc.) drop a
  # `docker-compose.override.yml` next to this file — compose merges it
  # automatically and the override stays out of git.
  server:
    image: ghcr.io/sounmu/netsentinel-server:${NETSENTINEL_VERSION:-latest}
    restart: unless-stopped
    networks:
      - netsentinel
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///app/data/netsentinel.db
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -sf http://localhost:3000/api/health > /dev/null || exit 1"
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s
    ports:
      - "${SERVER_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

networks:
  netsentinel:
    driver: bridge
