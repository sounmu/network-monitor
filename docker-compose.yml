version: "3.8"

services:
  # 1. PostgreSQL DB: 외부에 포트 노출하지 않고 내부망 연결만 허용
  db:
    image: timescale/timescaledb:latest-pg15 
    restart: unless-stopped
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-network_monitor}
    networks:
      - backend-internal

  # 2. Rust 백엔드 서버 (Ubuntu 24.04 베이스 러너)
  server:
    build:
      context: ./network-monitor-server
      dockerfile: Dockerfile
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - ./network-monitor-server/.env:/app/.env
      - ./network-monitor-server/config.yaml:/app/config.yaml
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-network_monitor}
    networks:
      - shared-network
      - backend-internal

  # 3. Next.js 프론트엔드 앱 (Standalone)
  web:
    build:
      context: ./network-monitor-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        - NEXT_PUBLIC_WEB_API_KEY=${NEXT_PUBLIC_WEB_API_KEY:-default_web_api_key}
    depends_on:
      - server
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    networks:
      - shared-network


networks:
  shared-network:
    external: true
  backend-internal: