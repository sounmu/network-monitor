name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  agent-binaries:
    name: Agent binary (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - platform: darwin-amd64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - platform: darwin-arm64
            os: macos-15
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Install musl toolchain
        if: startsWith(matrix.platform, 'linux-')
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build agent
        working-directory: agent
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package agent
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp "agent/target/${{ matrix.target }}/release/netsentinel-agent" dist/package/netsentinel-agent
          chmod 755 dist/package/netsentinel-agent
          tar -C dist/package -czf "dist/netsentinel-agent-${{ matrix.platform }}.tar.gz" netsentinel-agent

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: netsentinel-agent-${{ matrix.platform }}
          path: dist/netsentinel-agent-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  github-release:
    name: GitHub Release
    needs: agent-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: netsentinel-agent-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum netsentinel-agent-*.tar.gz > SHA256SUMS

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/netsentinel-agent-linux-amd64.tar.gz
            dist/netsentinel-agent-linux-arm64.tar.gz
            dist/netsentinel-agent-darwin-amd64.tar.gz
            dist/netsentinel-agent-darwin-arm64.tar.gz
            dist/SHA256SUMS
