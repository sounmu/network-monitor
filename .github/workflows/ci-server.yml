name: CI — Server & Agent

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  server:
    name: Server (fmt / check / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netsentinel-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: netsentinel-server

      - name: Check formatting
        run: cargo fmt --check

      - name: Cargo check (no build artifacts)
        run: cargo check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test

  agent:
    name: Agent (fmt / check / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netsentinel-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: netsentinel-agent

      - name: Check formatting
        run: cargo fmt --check

      - name: Cargo check (no build artifacts)
        run: cargo check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test
