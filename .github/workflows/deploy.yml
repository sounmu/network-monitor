name: Deploy

on:
  workflow_dispatch: # manual trigger from GitHub UI only

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── CI: Rust (server + agent) ─────────────────────────────────
  ci-server:
    name: CI — Server (fmt / check / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netsentinel-server
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: netsentinel-server
      - run: cargo fmt --check
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  ci-agent:
    name: CI — Agent (fmt / check / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netsentinel-agent
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: netsentinel-agent
      - run: cargo fmt --check
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  ci-web:
    name: CI — Web (lint / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netsentinel-web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: netsentinel-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --passWithNoTests
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # ── Deploy: rsync + build on server (native ARM64) ────────────
  deploy:
    name: Deploy to Server
    needs: [ci-server, ci-agent, ci-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync source to server
        # `data/` holds the live SQLite files (`netsentinel.db`,
        # `netsentinel.db-wal`, `netsentinel.db-shm`) that the server
        # process opens with mmap + WAL — rsync's `--delete` can't
        # unlink them while the server is running, which surfaces as
        # `Permission denied (13)` and a non-zero exit (code 23). The
        # source repo never contains a `data/` directory (gitignored),
        # so excluding it from the sync leaves the running DB
        # untouched. Same rationale for `*.db*` glob: any stray copy
        # somewhere outside `data/` should also stay put.
        run: |
          rsync -azP --delete \
            --exclude '.git/' \
            --exclude 'target/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude 'pgdata/' \
            --exclude 'data/' \
            --exclude '*.db' \
            --exclude '*.db-wal' \
            --exclude '*.db-shm' \
            --exclude '.env' \
            --exclude '*.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/netsentinel/

      - name: Build & restart on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -euo pipefail

            # 1) Shut down any legacy network-monitor stack before it can
            #    collide on ports 3000 / 3001 with the new netsentinel stack.
            #    Idempotent: a no-op once the directory is gone.
            if [ -d ~/network-monitor ] && [ -f ~/network-monitor/docker-compose.yml ]; then
              echo "⚠️  Legacy ~/network-monitor detected — shutting it down"
              (cd ~/network-monitor && docker compose down --remove-orphans) || true
            fi

            # 2) One-time pgdata migration: if the legacy bind-mount still holds
            #    TimescaleDB data and the new directory is empty, move it over
            #    atomically. PostgreSQL must already be stopped by step (1) —
            #    moving a live data dir would corrupt WAL. The `! -d` guard
            #    makes the whole step idempotent across re-runs.
            mkdir -p ~/netsentinel
            if [ -d ~/network-monitor/pgdata ] && [ ! -d ~/netsentinel/pgdata ]; then
              echo "📦 Migrating pgdata from legacy path → ~/netsentinel/pgdata"
              mv -v ~/network-monitor/pgdata ~/netsentinel/pgdata
            fi

            # 3) Bring up the new stack. --remove-orphans cleans up any
            #    stale services (incl. the legacy `web` container which
            #    was folded into `server` in v0.3.6).
            cd ~/netsentinel
            docker compose up -d --build --remove-orphans server

            # 4) Prune dangling layers AND tagged legacy images. Without
            #    the explicit rmi, the old `network-monitor-server`,
            #    `network-monitor-web`, and `netsentinel-web` images all
            #    linger and eat disk on the Oracle free-tier boot volume.
            docker image prune -f
            docker images --format '{{.Repository}}:{{.Tag}}' \
              | grep -E '^(ghcr\.io/sounmu/)?(network-monitor-(server|web)|netsentinel-web):' \
              | xargs -r docker rmi -f || true
          EOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -euo pipefail

            # IMPORTANT: never call `exit 0` mid-heredoc. The ssh client keeps
            # feeding the remaining heredoc bytes into stdin; an early remote
            # exit closes that FD, the client writes into a closed pipe,
            # SIGPIPE fires, and ssh returns a non-zero status even though
            # the remote script succeeded. Use a flag + natural EOF fallthrough.

            # Guard against the legacy container answering on :3000 while the
            # new netsentinel-server failed to start — previously that produced
            # a false-positive green health check.
            # No `head -1` here — under `set -o pipefail` an EPIPE on docker
            # would be treated as a failure. docker ps is already filtered.
            RUNNING=$(docker ps --filter "name=netsentinel-server" --format '{{.Names}}')
            if [ -z "$RUNNING" ]; then
              echo "❌ netsentinel-server container is not running"
              docker compose -f ~/netsentinel/docker-compose.yml logs --tail=50 server
              exit 1
            fi
            echo "✅ Container up: $RUNNING"

            health_ok=0
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ Health check passed (attempt $i)"
                health_ok=1
                break
              fi
              sleep 2
            done
            if [ "$health_ok" -ne 1 ]; then
              echo "❌ Health check failed after 60s"
              docker compose -f ~/netsentinel/docker-compose.yml logs --tail=30 server
              exit 1
            fi

            if ! curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "❌ Web root check failed"
              docker compose -f ~/netsentinel/docker-compose.yml logs --tail=30 server
              exit 1
            fi
            echo "✅ Web root check passed"

            if ! curl -sf "http://localhost:3000/host/?key=test-host:9101" > /dev/null 2>&1; then
              echo "❌ /host page check failed"
              docker compose -f ~/netsentinel/docker-compose.yml logs --tail=30 server
              exit 1
            fi
            echo "✅ /host page check passed"
          EOF
