name: Deploy

on:
  workflow_dispatch: # manual trigger from GitHub UI only

env:
  REGISTRY: ghcr.io
  CARGO_TERM_COLOR: always
  # Oracle Cloud Ampere A1 = arm64. Change to linux/amd64 if your server is x86_64.
  # Verify with: ssh your-server "uname -m"  (aarch64 = arm64, x86_64 = amd64)
  PLATFORM: linux/arm64

permissions:
  contents: read
  packages: write

jobs:
  # ── CI: Rust (server + agent) ─────────────────────────────────
  ci-server:
    name: CI — Server (fmt / check / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: network-monitor-server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: network-monitor-server
      - run: cargo fmt --check
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  ci-agent:
    name: CI — Agent (fmt / check / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: network-monitor-agent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: network-monitor-agent
      - run: cargo fmt --check
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  ci-web:
    name: CI — Web (lint / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: network-monitor-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: network-monitor-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --passWithNoTests
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # ── Build & push server image ──────────────────────────────────
  build-server:
    name: Build Server Image
    needs: [ci-server, ci-agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: ./network-monitor-server
          file: ./network-monitor-server/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/network-monitor-server:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/network-monitor-server:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  # ── Build & push web image ────────────────────────────────────
  build-web:
    name: Build Web Image
    needs: [ci-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./network-monitor-web
          file: ./network-monitor-web/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/network-monitor-web:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/network-monitor-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── Deploy to Oracle server ───────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: [build-server, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy docker-compose.yml to server
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/network-monitor/docker-compose.yml

      - name: Pull images & restart
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/network-monitor
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull server web
            docker compose up -d server web
            docker image prune -f
          EOF
