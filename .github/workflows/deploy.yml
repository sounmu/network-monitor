name: Deploy

on:
  workflow_dispatch: # manual trigger from GitHub UI only

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── CI: Rust (server + agent) ─────────────────────────────────
  ci-server:
    name: CI — Server (fmt / check / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netsentinel-server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: netsentinel-server
      - run: cargo fmt --check
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  ci-agent:
    name: CI — Agent (fmt / check / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netsentinel-agent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: netsentinel-agent
      - run: cargo fmt --check
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  ci-web:
    name: CI — Web (lint / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netsentinel-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: netsentinel-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --passWithNoTests
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # ── Deploy: rsync + build on server (native ARM64) ────────────
  deploy:
    name: Deploy to Server
    needs: [ci-server, ci-agent, ci-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync source to server
        run: |
          rsync -azP --delete \
            --exclude '.git/' \
            --exclude 'target/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude 'pgdata/' \
            --exclude '.env' \
            --exclude '*.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/netsentinel/

      - name: Build & restart on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/netsentinel
            docker compose up -d --build server web
            docker image prune -f
          EOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ Health check passed (attempt $i)"
                exit 0
              fi
              sleep 2
            done
            echo "❌ Health check failed after 60s"
            docker compose -f ~/netsentinel/docker-compose.yml logs --tail=30 server
            exit 1
          EOF
